<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - FarmOps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-center;
      min-height: 100vh;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-center;
      font-size: 48px;
      font-weight: bold;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }
    
    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .features {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 32px;
      text-align: left;
    }
    
    .features h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    
    .features ul {
      list-style: none;
    }
    
    .features li {
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }
    
    .features li:before {
      content: '✓';
      position: absolute;
      left: 0;
      font-weight: bold;
    }
    
    .status {
      margin-top: 24px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 14px;
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">F</div>
    <h1>You're Offline</h1>
    <p>
      No internet connection detected. Don't worry - FarmOps works offline!
    </p>
    
    <div class="features">
      <h2>Available Offline:</h2>
      <ul>
        <li>View existing tasks and data</li>
        <li>Create new tasks with proof of work</li>
        <li>Record daily updates</li>
        <li>All changes sync when you're back online</li>
      </ul>
    </div>
    
    <div class="status pulse">
      <strong>Waiting for connection...</strong>
    </div>
  </div>
  
  <script>
    // Redirect to app when back online
    window.addEventListener('online', () => {
      window.location.href = '/farm/dashboard';
    });
  </script>
</body>
</html>
